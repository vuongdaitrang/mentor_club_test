name: dang-reel

on:
  repository_dispatch:
    types: [dang-reel]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Đăng Reel
        env:
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FB_PAGE_TOKEN:   ${{ secrets.FB_PAGE_TOKEN }}
          LARK_APP_ID:     ${{ github.event.client_payload.lark_app_id || 'cli_aac2cc9af1f8de15' }}
          LARK_APP_TOKEN:  ${{ github.event.client_payload.base_token || 'PanKbZN6RamBafs3Y7wjArx2pMg' }}
          LARK_TABLE_ID:   ${{ github.event.client_payload.table_id || 'tblopLrHPe2A4QB0' }}
          FB_PAGE_ID:      ${{ github.event.client_payload.fb_page_id || '446883538502198' }}
          RESPECT_SCHEDULE: ${{ github.event.client_payload.respect_schedule }}
          REEL_CHUNK_MB:   ${{ github.event.client_payload.reel_chunk_mb }}
        run: node scripts/post-reels-api.js ${{ github.event.client_payload.mode }}
